{{- if .Values.gpgPrivateKeyB64 }}
apiVersion: v1
kind: Secret
metadata:
  name: gpg-key
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "tatara-argo-workflows.labels" . | nindent 4 }}
type: Opaque
stringData:
  GPG_PRIVATE_RSA_B64: {{ required "gpgPrivateKeyB64 required (from sops values)" .Values.gpgPrivateKeyB64 | quote }}
{{- end }}
