apiVersion: argoproj.io/v1alpha1
kind: ClusterWorkflowTemplate
metadata:
  name: tatara-container-build
  labels:
    {{- include "tatara-argo-workflows.labels" . | nindent 4 }}
spec:
  entrypoint: main
  onExit: report-exit
  arguments:
    parameters:
      - { name: repo,      value: "" }
      - { name: ref,       value: "" }
      - { name: sha,       value: "" }
      - { name: imageName, value: "" }
      - { name: provider,  value: "" }
      - { name: action,    value: "" }
  volumeClaimTemplates:
    - metadata:
        name: workspace
      spec:
        accessModes: [ReadWriteMany]
        storageClassName: rook-ceph-rwx
        resources:
          requests:
            storage: 4Gi
  templates:
    - name: main
      inputs:
        parameters:
          - name: repo
          - name: ref
          - name: sha
          - name: imageName
          - { name: provider, default: "" }
          - { name: action,   default: "" }
      steps:
        - - name: report-pending
            templateRef:
              name: tatara-github-status
              template: report
              clusterScope: true
            arguments:
              parameters:
                - { name: repo,        value: "{{`{{inputs.parameters.repo}}`}}" }
                - { name: sha,         value: "{{`{{inputs.parameters.sha}}`}}" }
                - { name: state,       value: "pending" }
                - { name: context,     value: "tatara/container" }
                - { name: description, value: "building amd64 image" }
                - { name: targetUrl,   value: "https://workflows.szymonrichert.pl/workflows/{{`{{workflow.namespace}}`}}/{{`{{workflow.name}}`}}" }
        - - name: clone
            template: clone
            arguments:
              parameters:
                - { name: repo, value: "{{`{{inputs.parameters.repo}}`}}" }
                - { name: sha,  value: "{{`{{inputs.parameters.sha}}`}}" }
        - - name: build-push
            template: build-push
            arguments:
              parameters:
                - { name: repo,      value: "{{`{{inputs.parameters.repo}}`}}" }
                - { name: ref,       value: "{{`{{inputs.parameters.ref}}`}}" }
                - { name: imageName, value: "{{`{{inputs.parameters.imageName}}`}}" }

    - name: clone
      inputs:
        parameters:
          - name: repo
          - name: sha
      container:
        image: {{ .Values.images.git | quote }}
        workingDir: /workspace
        command: [sh, -c]
        env:
          - name: GITHUB_TOKEN
            valueFrom:
              secretKeyRef:
                name: github-status-token
                key: GITHUB_TOKEN
        args:
          - |
            set -eux
            git clone --depth=1 "https://x-access-token:${GITHUB_TOKEN}@github.com/{{`{{inputs.parameters.repo}}`}}" src
            cd src
            git fetch --depth=1 origin "{{`{{inputs.parameters.sha}}`}}" || true
            git checkout "{{`{{inputs.parameters.sha}}`}}"
        volumeMounts:
          - { name: workspace, mountPath: /workspace }

    - name: build-push
      inputs:
        parameters:
          - name: repo
          - name: ref
          - name: imageName
      container:
        image: {{ .Values.images.kaniko | quote }}
        workingDir: /workspace/src
        command: [/busybox/sh, -c]
        env:
          - name: HARBOR_USERNAME
            valueFrom:
              secretKeyRef:
                name: harbor-robot
                key: username
          - name: HARBOR_PASSWORD
            valueFrom:
              secretKeyRef:
                name: harbor-robot
                key: password
        args:
          - |
            set -eu
            mkdir -p /kaniko/.docker
            { set +x; B64=$(printf '%s:%s' "$HARBOR_USERNAME" "$HARBOR_PASSWORD" | base64 -w0); } 2>/dev/null
            cat > /kaniko/.docker/config.json <<JSON
            {"auths":{"{{ .Values.harbor.registry }}":{"auth":"${B64}"}}}
            JSON
            REF="{{`{{inputs.parameters.ref}}`}}"
            TAG_V="${REF#refs/tags/}"
            TAG_PLAIN="${TAG_V#v}"
            IMG="{{ .Values.harbor.registry }}/{{`{{inputs.parameters.imageName}}`}}"
            /kaniko/executor \
              --context=dir:///workspace/src \
              --dockerfile=/workspace/src/Dockerfile \
              --destination="${IMG}:${TAG_V}" \
              --destination="${IMG}:${TAG_PLAIN}" \
              --cache=false \
              --snapshot-mode=redo
        volumeMounts:
          - { name: workspace, mountPath: /workspace }

    - name: report-exit
      steps:
        - - name: post
            templateRef:
              name: tatara-github-status
              template: report
              clusterScope: true
            arguments:
              parameters:
                - { name: repo,        value: "{{`{{workflow.parameters.repo}}`}}" }
                - { name: sha,         value: "{{`{{workflow.parameters.sha}}`}}" }
                - { name: state,       value: "{{`{{workflow.status}}`}}" }
                - { name: context,     value: "tatara/container" }
                - { name: description, value: "{{`{{workflow.status}}`}}" }
                - { name: targetUrl,   value: "https://workflows.szymonrichert.pl/workflows/{{`{{workflow.namespace}}`}}/{{`{{workflow.name}}`}}" }
