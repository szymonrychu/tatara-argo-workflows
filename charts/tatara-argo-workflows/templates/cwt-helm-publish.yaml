apiVersion: argoproj.io/v1alpha1
kind: ClusterWorkflowTemplate
metadata:
  name: tatara-helm-publish
  labels:
    {{- include "tatara-argo-workflows.labels" . | nindent 4 }}
spec:
  entrypoint: main
  onExit: report-exit
  arguments:
    parameters:
      - { name: repo,      value: "" }
      - { name: ref,       value: "" }
      - { name: sha,       value: "" }
      - { name: chartDir,  value: "" }
      - { name: chartName, value: "" }
      - { name: provider,  value: "" }
      - { name: action,    value: "" }
  volumeClaimTemplates:
    - metadata:
        name: workspace
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 2Gi
  templates:
    - name: main
      inputs:
        parameters:
          - name: repo
          - name: ref
          - name: sha
          - name: chartDir
          - name: chartName
          - { name: provider, default: "" }
          - { name: action,   default: "" }
      steps:
        - - name: report-pending
            templateRef:
              name: tatara-github-status
              template: report
              clusterScope: true
            arguments:
              parameters:
                - { name: repo,        value: "{{`{{inputs.parameters.repo}}`}}" }
                - { name: sha,         value: "{{`{{inputs.parameters.sha}}`}}" }
                - { name: state,       value: "pending" }
                - { name: context,     value: "tatara/chart" }
                - { name: description, value: "packaging chart" }
                - { name: targetUrl,   value: "https://workflows.szymonrichert.pl/workflows/{{`{{workflow.namespace}}`}}/{{`{{workflow.name}}`}}" }
        - - name: clone
            template: clone
            arguments:
              parameters:
                - { name: repo, value: "{{`{{inputs.parameters.repo}}`}}" }
                - { name: sha,  value: "{{`{{inputs.parameters.sha}}`}}" }
        - - name: package-push
            template: package-push
            arguments:
              parameters:
                - { name: ref,       value: "{{`{{inputs.parameters.ref}}`}}" }
                - { name: chartDir,  value: "{{`{{inputs.parameters.chartDir}}`}}" }
                - { name: chartName, value: "{{`{{inputs.parameters.chartName}}`}}" }

    - name: clone
      inputs:
        parameters:
          - name: repo
          - name: sha
      container:
        image: {{ .Values.images.git | quote }}
        workingDir: /workspace
        command: [sh, -c]
        env:
          - name: GITHUB_TOKEN
            valueFrom:
              secretKeyRef:
                name: github-status-token
                key: GITHUB_TOKEN
        args:
          - |
            set -eux
            git clone --depth=1 "https://x-access-token:${GITHUB_TOKEN}@github.com/{{`{{inputs.parameters.repo}}`}}" src
            cd src
            git fetch --depth=1 origin "{{`{{inputs.parameters.sha}}`}}" || true
            git checkout "{{`{{inputs.parameters.sha}}`}}"
        volumeMounts:
          - { name: workspace, mountPath: /workspace }

    - name: package-push
      inputs:
        parameters:
          - name: ref
          - name: chartDir
          - name: chartName
      container:
        image: {{ .Values.images.helm | quote }}
        workingDir: /workspace/src
        command: [sh, -c]
        env:
          - name: HARBOR_USERNAME
            valueFrom:
              secretKeyRef:
                name: harbor-robot
                key: username
          - name: HARBOR_PASSWORD
            valueFrom:
              secretKeyRef:
                name: harbor-robot
                key: password
        args:
          - |
            set -eux
            apk add --no-cache sed >/dev/null
            CHART_DIR="{{`{{inputs.parameters.chartDir}}`}}"
            CHART_NAME="{{`{{inputs.parameters.chartName}}`}}"
            REF="{{`{{inputs.parameters.ref}}`}}"
            TAG_V="${REF#refs/tags/}"
            VER="${TAG_V#v}"
            sed -i "s/^version:.*/version: ${VER}/"     "${CHART_DIR}/Chart.yaml"
            sed -i "s/^appVersion:.*/appVersion: \"${VER}\"/" "${CHART_DIR}/Chart.yaml"
            helm dependency update "${CHART_DIR}"
            helm package "${CHART_DIR}"
            echo "${HARBOR_PASSWORD}" | helm registry login -u "${HARBOR_USERNAME}" --password-stdin {{ .Values.harbor.registry }}
            helm push "${CHART_NAME}-${VER}.tgz" "oci://{{ .Values.harbor.registry }}/charts"
        volumeMounts:
          - { name: workspace, mountPath: /workspace }

    - name: report-exit
      steps:
        - - name: post
            templateRef:
              name: tatara-github-status
              template: report
              clusterScope: true
            arguments:
              parameters:
                - { name: repo,        value: "{{`{{workflow.parameters.repo}}`}}" }
                - { name: sha,         value: "{{`{{workflow.parameters.sha}}`}}" }
                - { name: state,       value: "{{`{{workflow.status}}`}}" }
                - { name: context,     value: "tatara/chart" }
                - { name: description, value: "{{`{{workflow.status}}`}}" }
                - { name: targetUrl,   value: "https://workflows.szymonrichert.pl/workflows/{{`{{workflow.namespace}}`}}/{{`{{workflow.name}}`}}" }
